<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SLAUGHTERDOME</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; position: relative; z-index: 0; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  #ui > * { pointer-events: auto; }
  #title { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; }
  #title h1 { font-size: 64px; color: #ff4444; text-shadow: 0 0 20px #ff0000; letter-spacing: 8px; }
  #title input { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; padding: 8px 16px; font-size: 18px; font-family: inherit; text-align: center; margin: 20px 0; outline: none; }
  #title input::placeholder { color: #666; }
  #title button { background: #ff4444; color: #fff; border: none; padding: 12px 48px; font-size: 24px; font-family: inherit; cursor: pointer; letter-spacing: 4px; }
  #title button:hover { background: #ff6666; }
  #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 10px 20px; display: none; color: #fff; font-size: 14px; }
  #hud-wave { float: left; font-size: 18px; }
  #hud-score { float: right; font-size: 18px; }
  #hud-hp { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); }
  #hp-bar { width: 200px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
  #hp-fill { height: 100%; background: #44ff44; transition: width 0.2s; }
  #combo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; color: #ffcc00; text-shadow: 0 0 10px #ffcc00; display: none; pointer-events: none; }
  #gameover { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; display: none; }
  #gameover h2 { font-size: 48px; color: #ff4444; margin-bottom: 20px; }
  #gameover .stats { font-size: 18px; margin: 10px 0; }
  #gameover button { background: #ff4444; color: #fff; border: none; padding: 12px 48px; font-size: 20px; font-family: inherit; cursor: pointer; margin-top: 20px; letter-spacing: 4px; }
  #ping { position: absolute; top: 10px; right: 10px; color: #666; font-size: 12px; display: none; }
  #upgrade-shop { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:flex; gap:16px; z-index:50; }
  .upgrade-card { background:#1a1a1a; border:2px solid #888; border-radius:4px; padding:16px 20px; width:180px; cursor:pointer; text-align:center; font-family:'Courier New',monospace; transition:transform 0.1s,border-color 0.1s; }
  .upgrade-card:hover { transform:scale(1.05); border-color:#fff; }
  .upgrade-tier { font-size:10px; letter-spacing:2px; margin-bottom:6px; }
  .upgrade-name { color:#fff; font-size:16px; font-weight:bold; margin-bottom:8px; }
  .upgrade-desc { color:#aaa; font-size:12px; margin-bottom:10px; }
  .upgrade-key { color:#555; font-size:11px; }
  #upgrade-strip { position:absolute; bottom:38px; left:50%; transform:translateX(-50%); color:#e6993a; font-size:11px; font-family:'Courier New',monospace; letter-spacing:1px; text-align:center; }
</style>
</head>
<body>
<div id="ui">
  <div id="title">
    <h1>SLAUGHTERDOME</h1>
    <p style="color:#888; margin-bottom: 20px;">WAVE SURVIVAL ARENA</p>
    <input id="name-input" type="text" placeholder="Enter name..." maxlength="12">
    <br>
    <button id="play-btn">PLAY</button>
    <p style="color:#555; margin-top:20px; font-size:12px;">WASD move / Mouse aim / LMB shoot / RMB AoE / E build wall</p>
  </div>
  <div id="hud">
    <div id="hud-wave">WAVE 1</div>
    <div id="hud-score">SCORE: 0</div>
    <div id="hud-hp"><div id="hp-bar"><div id="hp-fill" style="width:100%"></div></div>
    <div id="dash-bar" style="width:200px;height:3px;background:#222;border-radius:2px;margin-top:4px;"><div id="dash-fill" style="height:100%;width:100%;background:#e6993a;border-radius:2px;transition:width 0.1s;"></div></div></div>
  </div>
  <div id="combo"></div>
  <div id="gameover">
    <h2>GAME OVER</h2>
    <div class="stats" id="go-wave"></div>
    <div class="stats" id="go-score"></div>
    <div class="stats" id="go-kills"></div>
    <button id="restart-btn">PLAY AGAIN</button>
  </div>
  <div id="ping"></div>
  <div id="upgrade-shop" style="display:none;"></div>
  <div id="upgrade-strip"></div>
</div>
<div id="flash-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;opacity:0;"></div>
<script>
  // Override for custom server URL
  // window.SLAUGHTERDOME_WS = 'wss://your-server.up.railway.app';
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
